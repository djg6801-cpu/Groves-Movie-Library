        localStorage.setItem(key, value);
        return { key, value };

      const [showClearConfirm, setShowClearConfirm] = useState(false);

      const [selectionMode, setSelectionMode] = useState(false);
      const [showFetchReview, setShowFetchReview] = useState(false);

      const [showFloatingMenu, setShowFloatingMenu] = useState(false);
      const [githubJsonUrl, setGithubJsonUrl] = useState('https://github.com/djg6801-cpu/Groves-Movie-Library/blob/main/movies.json');

      const [autocompleteSuggestions, setAutocompleteSuggestions] = useState({
        director: [],

      });

      const [serviceInput, setServiceInput] = useState('');
      const [genreInput, setGenreInput] = useState('');

        director: -1,
        genre: -1,
        actor: -1,
        service: -1
      });
      const [letterFilter, setLetterFilter] = useState('');
      const [showFloatingSearch, setShowFloatingSearch] = useState(false);
      const [undoStack, setUndoStack] = useState([]);
      const [undoDescription, setUndoDescription] = useState('');
      const [storageWarning, setStorageWarning] = useState(false);

      useEffect(() => {
        const loadMovies = async () => {
          try {
            const result = await window.storage.get('movie-library-data');
            if (result && result.value) {
              const parsed = JSON.parse(result.value);
              
              // Check size and warn if too large
              const sizeInMB = (result.value.length / (1024 * 1024)).toFixed(2);
              if (result.value.length > 3000000) {
                setStorageWarning(true);
                console.warn(`Library is ${sizeInMB}MB - approaching localStorage limits!`);
              }
              
              // Check for corruption - if we have way too many movies or duplicates, something is wrong
              if (Array.isArray(parsed)) {
                // Remove exact duplicates by ID
                const uniqueById = new Map();
                parsed.forEach(m => {
                  if (!uniqueById.has(m.id)) {
                    uniqueById.set(m.id, m);
                  }
                });
                
                const cleaned = Array.from(uniqueById.values());
                
                if (cleaned.length !== parsed.length) {
                  console.warn(`Removed ${parsed.length - cleaned.length} duplicate entries`);
                  showNotification(`⚠️ Cleaned ${parsed.length - cleaned.length} corrupted entries`);
                  setStorageWarning(true);
                }
                
                setMovies(cleaned);
              }
            }
          } catch (error) {
            console.error('Failed to load movies:', error);
            showNotification('⚠️ Storage corrupted. Please import from JSON backup.');
            setStorageWarning(true);
          }
        };
        
        const loadApiKey = async () => {
          try {
            const result = await window.storage.get('omdb-api-key');
            if (result && result.value) {
              setApiKey(result.value);
            }
          } catch (error) {
            console.log('Using default API key');
          }
        };

        const loadGithubUrl = async () => {
          try {
            const result = await window.storage.get('github-json-url');
            const url = (result && result.value) 
              ? result.value 
              : 'https://github.com/djg6801-cpu/Groves-Movie-Library/blob/main/movies.json';
            setGithubJsonUrl(url);
            fetchFromGithub(url);
          } catch (error) {
            // Fall back to hardcoded URL
            fetchFromGithub('https://github.com/djg6801-cpu/Groves-Movie-Library/blob/main/movies.json');
          }
        };
        
        loadMovies();
        loadApiKey();
        loadGithubUrl();
      }, []);

      useEffect(() => {
        if (notification) {
          const timer = setTimeout(() => setNotification(''), 3000);
          return () => clearTimeout(timer);
        }
      }, [notification]);

      // Detect scroll to show/hide floating buttons and menu
      useEffect(() => {
        const handleScroll = () => {
          const shouldShow = window.scrollY > 300;
          setShowFloatingButtons(shouldShow);
          setShowFloatingMenu(shouldShow);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // Auto-save DISABLED - use Export JSON instead

      //   if (movies.length > 0) {

      //       try {
      //         const jsonData = JSON.stringify(movies);

      //         await window.storage.set('movie-library-data', jsonData);

      //       } catch (error) {

      //         // Don't show notification for auto-save failures to avoid spam
      //       }
      //     }, 1000);
      //     return () => clearTimeout(saveTimeout);
      //   }
      // }, [movies]);

      const showNotification = (message) => setNotification(message);

      const saveToUndo = (description) => {
        // Save current state to undo stack (keep last 10 actions)
        const snapshot = {
          movies: JSON.parse(JSON.stringify(movies)),
          description: description,
          timestamp: Date.now()
        };
        setUndoStack(prev => [...prev.slice(-9), snapshot]);
        setUndoDescription(description);
        console.log(`Saved to undo: ${description}`);
      };

      const performUndo = () => {
        if (undoStack.length === 0) {
          showNotification('Nothing to undo!');
          return;
        }
        
        const lastState = undoStack[undoStack.length - 1];
        setMovies(lastState.movies);
        setUndoStack(prev => prev.slice(0, -1));
        showNotification(`✅ Undone: ${lastState.description}`);
        console.log(`Undone: ${lastState.description}`);
      };

      const themes = {
        purple: { bg: 'from-gray-900 via-purple-900 to-gray-900', button: 'bg-purple-600 hover:bg-purple-700', border: 'border-purple-500/20 hover:border-purple-500/50', text: 'text-purple-400', gradient: 'from-purple-600 to-pink-600' },
        blue: { bg: 'from-gray-900 via-blue-900 to-gray-900', button: 'bg-blue-600 hover:bg-blue-700', border: 'border-blue-500/20 hover:border-blue-500/50', text: 'text-blue-400', gradient: 'from-blue-600 to-cyan-600' },
        green: { bg: 'from-gray-900 via-green-900 to-gray-900', button: 'bg-green-600 hover:bg-green-700', border: 'border-green-500/20 hover:border-green-500/50', text: 'text-green-400', gradient: 'from-green-600 to-emerald-600' },
        red: { bg: 'from-gray-900 via-red-900 to-gray-900', button: 'bg-red-600 hover:bg-red-700', border: 'border-red-500/20 hover:border-red-500/50', text: 'text-red-400', gradient: 'from-red-600 to-orange-600' },
        dark: { bg: 'from-black via-gray-900 to-black', button: 'bg-gray-700 hover:bg-gray-600', border: 'border-gray-500/20 hover:border-gray-500/50', text: 'text-gray-400', gradient: 'from-gray-700 to-slate-700' }
      };

      const currentTheme = themes[theme];

      const clearLibrary = async () => {
        saveToUndo(`Clear library (${movies.length} movies)`);
        setMovies([]);
        try {
          await window.storage.set('movie-library-data', JSON.stringify([]));
          showNotification('Library cleared!');
        } catch (error) {
          showNotification('Error clearing library');
        }
        setShowClearConfirm(false);
      };

      const saveMovies = async () => {
        try {
          const jsonData = JSON.stringify(movies);
          const sizeInMB = (jsonData.length / (1024 * 1024)).toFixed(2);
          console.log('Saving', movies.length, 'movies, size:', sizeInMB, 'MB');
          
          // Strong warning if approaching limits
          if (jsonData.length > 3000000) { // ~3MB warning (give buffer)
            showNotification(`⚠️ Library large (${sizeInMB}MB). Use Export JSON instead!`);
            return;
          }
          
          await window.storage.set('movie-library-data', jsonData);
          showNotification(`✅ Saved ${movies.length} movies (${sizeInMB}MB)`);
        } catch (error) {
          console.error('Save error:', error);
          if (error.name === 'QuotaExceededError' || error.message.includes('quota')) {
            showNotification('❌ Storage full! Use Export JSON instead.');
          } else {
            showNotification('❌ Save failed: ' + (error.message || 'Unknown error'));
          }
        }
      };

      const fetchFromGithub = async (urlOverride) => {
        const url = urlOverride || githubJsonUrl;
        if (!url) {
          showNotification('⚠️ No GitHub URL configured. Add it in Settings.');
          return;
        }
        // Convert github.com URLs to raw.githubusercontent.com automatically
        const rawUrl = url
          .replace('https://github.com/', 'https://raw.githubusercontent.com/')
          .replace('/blob/', '/');
        setGithubSyncStatus('loading');
        try {
          const response = await fetch(rawUrl);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          if (Array.isArray(data)) {
            setMovies(data);
            await window.storage.set('movie-library-data', JSON.stringify(data));
            setGithubSyncStatus('success');
          } else {
            throw new Error('Invalid JSON format');
          }
        } catch (error) {
          setGithubSyncStatus('error');
          console.warn('GitHub sync failed:', error.message);
          // Only notify if manually triggered, not on auto-load startup
          if (!urlOverride) {
            showNotification('❌ GitHub load failed: ' + error.message);
          }
        }
      };

      const saveGithubUrl = async (url) => {
        setGithubJsonUrl(url);
        await window.storage.set('github-json-url', url);
        showNotification('✅ GitHub URL saved!');
      };

      const exportToJSON = () => {
        try {
          const jsonData = JSON.stringify(movies, null, 2);
          const blob = new Blob([jsonData], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `movie-library-${new Date().toISOString().split('T')[0]}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showNotification(`Exported ${movies.length} movies!`);
        } catch (error) {
          showNotification('Export failed');
        }
      };

      const handleJSONUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (Array.isArray(data)) {
              // Merge with existing movies using the same duplicate logic
              mergeDuplicates(data);
              showNotification(`Loaded ${data.length} movies from JSON!`);
            } else {
              showNotification('Invalid JSON format');
            }
          } catch (error) {
            showNotification('Error reading JSON file');
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const importLetterboxdCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            // Parse CSV using PapaParse
            Papa.parse(event.target.result, {
              header: true,
              skipEmptyLines: true,
              complete: (results) => {
                console.log('=== LETTERBOXD IMPORT START ===');
                console.log('Total rows in CSV:', results.data.length);
                
                let matched = 0;
                let notFound = [];
                let updated = 0;
                
                const updatedMovies = [...movies];
                
                results.data.forEach(row => {
                  const title = row.Name || row.name;
                  const year = row.Year || row.year;
                  const rating = row.Rating || row.rating;
                  const watchedDate = row['Watched Date'] || row['watched date'] || row.Date || row.date;
                  const rewatch = (row.Rewatch || row.rewatch || '').toLowerCase() === 'yes';
                  const tags = row.Tags || row.tags || '';
                  const review = row.Review || row.review || '';
                  
                  if (!title) return;
                  
                  // Find matching movie in library
                  const movieIndex = updatedMovies.findIndex(m => {
                    const titleMatch = m.title.toLowerCase().trim() === title.toLowerCase().trim();
                    const yearMatch = !year || !m.year || m.year === year;
                    return titleMatch && yearMatch;
                  });
                  
                  if (movieIndex >= 0) {
                    // Update existing movie
                    matched++;
                    const movie = updatedMovies[movieIndex];
                    
                    // Only update if values changed
                    let hasChanges = false;
                    
                    if (rating && rating !== movie.letterboxdRating) {
                      movie.letterboxdRating = rating;
                      hasChanges = true;
                    }
                    
                    if (watchedDate && watchedDate !== movie.watchedDate) {
                      // Convert date format if needed (YYYY-MM-DD)
                      try {
                        const parsedDate = new Date(watchedDate);
                        if (!isNaN(parsedDate)) {
                          movie.watchedDate = parsedDate.toISOString().split('T')[0];
                          hasChanges = true;
                        }

      const normalizeTitle = (title) => {
        // Normalize "and" and "&" to be treated the same
        return title.replace(/\s+and\s+/gi, ' & ').replace(/\s+&\s+/g, ' & ');
      };

      const normalizeNumbers = (title) => {
        // Convert written numbers to digits and vice versa for better matching
        const numberMap = {
          'zero': '0', '0': 'zero',
          'one': '1', '1': 'one',
          'two': '2', '2': 'two',
          'three': '3', '3': 'three',
          'four': '4', '4': 'four',
          'five': '5', '5': 'five',
          'six': '6', '6': 'six',
          'seven': '7', '7': 'seven',
          'eight': '8', '8': 'eight',
          'nine': '9', '9': 'nine',
          'ten': '10', '10': 'ten'
        };
        
        // Try with written numbers replaced by digits
        let normalized = title.toLowerCase();
        Object.keys(numberMap).forEach(key => {
          const regex = new RegExp('\\b' + key + '\\b', 'gi');
          normalized = normalized.replace(regex, numberMap[key]);
        });
        
        return normalized;
      };

      const cleanTitleForSearch = (title) => {
        // Remove content in parentheses and brackets, normalize and/&, then trim
        let cleaned = title
          .replace(/\([^)]*\)/g, '') // Remove (content)
          .replace(/\[[^\]]*\]/g, '') // Remove [content]
          .trim();
        
        // Normalize "and" to "&" for consistency
        cleaned = normalizeTitle(cleaned);
        
        return cleaned;
      };

          // If no results, try with number normalization

              searchTitle = encodeURIComponent(normalizedTitle);

        for (let i = 0; i < movies.length; i++) {

          // Only fetch if missing data AND haven't hit batch limit AND not excluded
          if (shouldFetchMovie(m) && fetchCount < batchSize) {

              updated.push(m);
              continue;

            try {

                showNotification('API limit reached! Stopping...');

              failed++;

          if (map.has(compositeKey)) {

      const resolveDuplicate = (key, keepExisting) => {
        const dup = duplicates.find(d => d.key === key);
        if (!dup) return;
        
        // Decide which movie to keep
        const keepMovie = keepExisting ? dup.existing : dup.new;
        
        // Parse composite key to get title and year
        const [titleKey, year] = key.split('|');
        
        // Remove ALL movies with this exact title+year combo, then add back the one we're keeping
        const filtered = movies.filter(m => {
          const mTitleKey = m.title.trim().toLowerCase();
          const mYear = m.year || '';
          return !(mTitleKey === titleKey && mYear === year);
        });
        setMovies([...filtered, keepMovie]);
        
        // Remove this duplicate from the list
        const remain = duplicates.filter(d => d.key !== key);
        setDuplicates(remain);
        
        // Close panel if no more duplicates
        if (remain.length === 0) {
          setShowIssuesPanel(false);
        }
        
        showNotification('Duplicate resolved!');
      };

      const keepBothDuplicates = (key) => {
        const dup = duplicates.find(d => d.key === key);
        if (!dup) return;
        
        // Just remove from duplicates list (both already exist in library)
        const remain = duplicates.filter(d => d.key !== key);
        setDuplicates(remain);
        
        // Close panel if no more duplicates
        if (remain.length === 0) {
          setShowIssuesPanel(false);
        }
        
        showNotification('Kept both entries!');
      };

      const resolveAllDuplicates = (keepExisting) => {
        // Build a map of which movies to keep (by composite key)
        const keepMap = new Map();
        
        duplicates.forEach(dup => {
          const keepMovie = keepExisting ? dup.existing : dup.new;
          // Only keep one per composite key
          if (!keepMap.has(dup.key)) {
            keepMap.set(dup.key, keepMovie);
          }
        });
        
        // Filter out all duplicates, then add back the ones we're keeping
        const nonDuplicates = movies.filter(m => {
          const titleKey = m.title.trim().toLowerCase();
          const year = m.year || '';
          const compositeKey = `${titleKey}|${year}`;
          return !keepMap.has(compositeKey);
        });
        
        setMovies([...nonDuplicates, ...Array.from(keepMap.values())]);
        setDuplicates([]);
        setShowIssuesPanel(false);
        showNotification('All duplicates resolved!');
      };

      const autoMergeAllDuplicates = () => {
        // Merge all duplicates automatically by combining services
        const mergedMap = new Map();
        
        // Add all non-duplicate movies first
        movies.forEach(m => {
          const titleKey = m.title.trim().toLowerCase();
          const year = m.year || '';
          const compositeKey = `${titleKey}|${year}`;
          const isDuplicate = duplicates.some(d => d.key === compositeKey);
          
          if (!isDuplicate) {
            mergedMap.set(compositeKey, m);
          }
        });
        
        // Now merge duplicates
        duplicates.forEach(dup => {
          if (!mergedMap.has(dup.key)) {
            // Combine services
            const existingServices = (dup.existing.service || '').split(',').map(s => s.trim()).filter(Boolean);
            const newServices = (dup.new.service || '').split(',').map(s => s.trim()).filter(Boolean);
            const combinedServices = [...new Set([...existingServices, ...newServices])].join(', ');
            
            // Create merged movie
            const merged = {
              ...dup.existing,
              service: combinedServices,
              imdbRating: dup.existing.imdbRating || dup.new.imdbRating,
              myRating: dup.existing.myRating || dup.new.myRating,
              plot: dup.existing.plot || dup.new.plot,
              poster: dup.existing.poster || dup.new.poster,
              director: dup.existing.director || dup.new.director,
              actors: dup.existing.actors || dup.new.actors,
              genre: dup.existing.genre || dup.new.genre,
              runtime: dup.existing.runtime || dup.new.runtime,
              year: dup.existing.year || dup.new.year,
            };
            
            mergedMap.set(dup.key, merged);
          }
        });
        
        setMovies(Array.from(mergedMap.values()));
        setDuplicates([]);
        setShowIssuesPanel(false);
        showNotification(`Auto-merged all duplicates with combined services!`);
      };

        // Build a map using title+year as composite key
        const dedupeMap = new Map();
        let duplicatesFound = 0;
        let duplicatesRemoved = 0;
        
        movies.forEach(m => {
          const titleKey = m.title.trim().toLowerCase();
          const year = m.year || '';
          const compositeKey = `${titleKey}|${year}`;
          
          if (dedupeMap.has(compositeKey)) {

            console.log(`\n🔄 Merging duplicate: "${m.title}" (${year})`);

            // Combine services

            const newServices = (m.service || '').split(',').map(s => s.trim()).filter(Boolean);
            const combinedServices = [...new Set([...existingServices, ...newServices])].join(', ');
            
            // Merge data - keep existing ID, combine services, fill blanks
            const merged = {
              ...existing, // Keep first movie's ID
              service: combinedServices,
              imdbRating: existing.imdbRating || m.imdbRating,
              myRating: existing.myRating || m.myRating,
              plot: existing.plot || m.plot,
              poster: existing.poster || m.poster,

              genre: existing.genre || m.genre,
              runtime: existing.runtime || m.runtime,
              year: existing.year || m.year,
            };
            
            dedupeMap.set(compositeKey, merged);
            duplicatesRemoved++;
            
            console.log(`  ✅ Merged -> id:${merged.id}, service: "${merged.service}"`);
          } else {
            // First occurrence, add to map
            dedupeMap.set(compositeKey, m);

                  <p className="text-gray-300 mb-6">Delete all {movies.length} movies? This cannot be undone.</p>
                  <div className="flex gap-4">
                    <button onClick={clearLibrary} className="flex-1 bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl font-semibold">Yes, Clear All</button>
                    <button onClick={() => setShowClearConfirm(false)} className="flex-1 bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-xl font-semibold">Cancel</button>
                  </div>
                </div>
              </div>
            )}

            {/* Duplicate Resolution Modal - Alternative detailed view */}
            {showDuplicateModal && duplicates.length > 0 && (
              <div className="fixed inset-0 bg-black/70 z-50 overflow-y-auto p-4">
                <div className="min-h-screen flex items-center justify-center py-8">
                  <div className="bg-gray-800 rounded-2xl border border-yellow-500/50 w-full max-w-6xl">
                    <div className="bg-gray-800 p-6 border-b border-gray-700">
                      <div className="flex justify-between items-start mb-3">
                        <div className="flex items-center gap-3">
                          <AlertCircle className="w-6 h-6 text-yellow-400" />
                          <h2 className="text-2xl font-bold">Resolve MEGA Duplicates</h2>
                        </div>
                        <button onClick={() => setShowDuplicateModal(false)} className="text-gray-400 hover:text-white">
                          <X className="w-6 h-6" />
                        </button>
                      </div>
                      <p className="text-gray-300 mb-4">Found {duplicates.length} movie(s) with matching titles involving MEGA.</p>
                      <div className="flex gap-3">
                        <button onClick={() => { resolveAllDuplicates(true); setShowDuplicateModal(false); }} className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-semibold">Keep All Existing</button>
                        <button onClick={() => { resolveAllDuplicates(false); setShowDuplicateModal(false); }} className="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg text-sm font-semibold">Keep All New</button>
                      </div>
                    </div>
                    
                    <div className="p-6 space-y-6">
                      {duplicates.map((dup, idx) => (
                        <div key={idx} className="bg-gray-700/50 rounded-xl p-6 border border-gray-600">
                          <h3 className="text-xl font-bold mb-2 text-purple-300">#{idx + 1}: "{dup.existing.title}"</h3>
                          <div className="grid md:grid-cols-3 gap-4">
                            <div className="bg-gray-800 rounded-lg p-4 border-2 border-blue-500/50">
                              <h4 className="font-semibold text-blue-400 mb-3">Existing</h4>
                              <div className="text-sm mb-3">
                                <p>Service: {dup.existing.service}</p>
                                <p>Year: {dup.existing.year || 'N/A'}</p>
                              </div>
                              <button onClick={() => resolveDuplicate(dup.key, true)} className="w-full bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-semibold">Keep This</button>
                            </div>
                            <div className="bg-gray-800 rounded-lg p-4 border-2 border-green-500/50">
                              <h4 className="font-semibold text-green-400 mb-3">New from CSV</h4>
                              <div className="text-sm mb-3">
                                <p>Service: {dup.new.service}</p>
                                <p>Year: {dup.new.year || 'N/A'}</p>
                              </div>
                              <button onClick={() => resolveDuplicate(dup.key, false)} className="w-full bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg text-sm font-semibold">Keep This</button>
                            </div>
                            <div className="bg-gray-800 rounded-lg p-4 border-2 border-purple-500/50">
                              <h4 className="font-semibold text-purple-400 mb-3">Keep Both</h4>
                              <p className="text-sm mb-3">Save both as separate entries</p>
                              <button onClick={() => keepBothDuplicates(dup.key)} className="w-full bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg text-sm font-semibold">Keep Both</button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}
            {/* Floating Action Menu */}
            {showFloatingMenu && (
              <div className="fixed bottom-6 right-6 flex flex-col gap-3 z-40">
                {/* Quick Action Buttons */}
                <div className="flex flex-col gap-2">
                  <button 
                    onClick={handleAddMovie}
                    className="flex items-center gap-2 bg-green-600 hover:bg-green-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                    title="Add Movie"
                  >
                    <Plus className="w-5 h-5" />
                    <span>Add</span>
                  </button>
                  <button 
                    onClick={saveMovies}
                    className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                    title="Save Now"
                  >
                    <Save className="w-5 h-5" />
                    <span>Save</span>
                  </button>
                  
                  {/* Export/Import */}
                  <button 
                    onClick={exportToJSON}
                    className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                    title="Export JSON"
                  >
                    <Download className="w-5 h-5" />
                    <span>JSON</span>
                  </button>
                  
                  {githubJsonUrl && (
                    <button 
                      onClick={() => fetchFromGithub()}
                      className="flex items-center gap-2 bg-green-600 hover:bg-green-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                      title="Reload from GitHub"
                    >
                      <span>🔄</span>
                      <span>GitHub</span>
                    </button>
                  )}
                  
                  <label 
                    className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 cursor-pointer text-sm"
                    title="Import JSON"
                  >
                    <input type="file" accept=".json" onChange={handleJSONUpload} className="hidden" />
                    <FolderOpen className="w-5 h-5" />
                    <span>Load</span>
                  </label>
                  
                  <button 
                    onClick={exportToCSV}
                    className="flex items-center gap-2 bg-teal-600 hover:bg-teal-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                    title="Export CSV"
                  >
                    <Download className="w-5 h-5" />
                    <span>CSV</span>
                  </button>
                  
                  <button 
                    onClick={detectExistingDuplicates}
                    className="flex items-center gap-2 bg-yellow-600 hover:bg-yellow-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                    title="Check for Duplicates"
                  >
                    <AlertCircle className="w-5 h-5" />
                    <span>Duplicates</span>
                  </button>
                  
                  <button 
                    onClick={autoDeduplicate}
                    className="flex items-center gap-2 bg-pink-600 hover:bg-pink-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                    title="Auto-Deduplicate All"
                  >
                    <AlertCircle className="w-5 h-5" />
                    <span>Dedupe</span>
                  </button>
                  
                  <button 
                    onClick={performUndo}
                    disabled={undoStack.length === 0}
                    className="flex items-center gap-2 bg-gray-600 hover:bg-gray-700 disabled:bg-gray-800 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                    title={undoStack.length > 0 ? `Undo: ${undoStack[undoStack.length - 1]?.description}` : 'Nothing to undo'}
                  >
                    <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <path d="M3 7v6h6"/>
                      <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
                    </svg>
                    <span>Undo</span>
                  </button>
                  
                  {/* Fetch Controls */}
                  {!selectionMode ? (
                    <>
                      <button 
                        onClick={fetchPostersForAll} 
                        disabled={fetchingPosters}
                        className="flex items-center gap-2 bg-orange-600 hover:bg-orange-700 disabled:bg-gray-600 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                        title="Fetch Movie Data"
                      >
                        <Download className="w-5 h-5" />
                        <span>{fetchingPosters ? 'Fetch...' : 'Fetch'}</span>
                      </button>
                      
                      <button 
                        onClick={() => setShowFetchReview(true)}
                        className="flex items-center gap-2 bg-yellow-600 hover:bg-yellow-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                        title="Review Fetch List"
                      >
                        <List className="w-5 h-5" />
                        <span>Review</span>
                      </button>
                      
                      <button 
                        onClick={() => setSelectionMode(true)}
                        className="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                        title="Select Movies"
                      >
                        <Grid3x3 className="w-5 h-5" />
                        <span>Select</span>
                      </button>
                    </>
                  ) : (
                    <>
                      <button 
                        onClick={fetchSelectedMovies} 
                        disabled={fetchingPosters || selectedMovies.size === 0}
                        className="flex items-center gap-2 bg-orange-600 hover:bg-orange-700 disabled:bg-gray-600 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                        title={`Fetch Selected (${selectedMovies.size})`}
                      >
                        <Download className="w-5 h-5" />
                        <span>({selectedMovies.size})</span>
                      </button>
                      
                      <button 
                        onClick={selectAllVisible}
                        className="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                        title="Select All"
                      >
                        <Grid3x3 className="w-5 h-5" />
                        <span>All</span>
                      </button>
                      
                      <button 
                        onClick={deselectAll}
                        className="flex items-center gap-2 bg-gray-600 hover:bg-gray-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                        title="Deselect All"
                      >
                        <X className="w-5 h-5" />
                        <span>Clear</span>
                      </button>
                      
                      <button 
                        onClick={() => { setSelectionMode(false); setSelectedMovies(new Set()); }}
                        className="flex items-center gap-2 bg-red-600 hover:bg-red-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                        title="Cancel Selection"
                      >
                        <X className="w-5 h-5" />
                        <span>Cancel</span>
                      </button>
                    </>
                  )}
                  
                  {/* Settings & Clear */}
                  <button 
                    onClick={() => setShowFloatingSearch(!showFloatingSearch)}
                    className={`flex items-center gap-2 ${showFloatingSearch ? 'bg-blue-600 hover:bg-blue-700' : 'bg-cyan-600 hover:bg-cyan-700'} px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm`}
                    title="Quick Search"
                  >
                    <Search className="w-5 h-5" />
                    <span>Search</span>
                  </button>
                  
                  <button 
                    onClick={() => {
                      if (window.confirm('⚠️ Clear corrupted localStorage? This will NOT delete your movies in memory. Export JSON first!')) {
                        try {
                          localStorage.removeItem('movie-library-data');
                          showNotification('✅ LocalStorage cleared. Now Export JSON!');
                        } catch (error) {
                          showNotification('❌ Could not clear storage');
                        }
                      }
                    }}
                    className="flex items-center gap-2 bg-orange-600 hover:bg-orange-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                    title="Fix corrupted localStorage"
                  >
                    <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                    </svg>
                    <span>Fix Storage</span>
                  </button>
                  
                  <button 
                    onClick={() => setShowSettings(true)}
                    className="flex items-center gap-2 bg-gray-700 hover:bg-gray-600 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                    title="Settings"
                  >
                    <Settings className="w-5 h-5" />
                    <span>Settings</span>
                  </button>
                  
                  <button 
                    onClick={() => setShowClearConfirm(true)}
                    className="flex items-center gap-2 bg-red-600 hover:bg-red-700 px-4 py-3 rounded-full font-semibold shadow-2xl transform transition-transform hover:scale-105 text-sm"
                    title="Clear Library"
                  >
                    <Trash2 className="w-5 h-5" />
                    <span>Clear</span>
                  </button>
                </div>
              </div>
            )}
            
            {/* Floating Search Panel */}
            {showFloatingSearch && showFloatingMenu && (
              <div className="fixed bottom-6 left-6 bg-gray-800 rounded-2xl border border-cyan-500/50 shadow-2xl z-40 p-4 w-96 max-w-[calc(100vw-3rem)]">
                <div className="flex items-center justify-between mb-3">
                  <h3 className="text-lg font-bold text-cyan-400">Quick Search</h3>
                  <button 
                    onClick={() => setShowFloatingSearch(false)}
                    className="text-gray-400 hover:text-white"
                  >
                    <X className="w-5 h-5" />
                  </button>
                </div>
                
                <div className="space-y-3">
                  <div>
                    <input
                      type="text"
                      placeholder="Search title, director, genre, actors..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      onKeyPress={(e) => e.key === 'Enter' && handleSearch(e)}
                      className="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white text-sm"
                      autoFocus
                    />
                  </div>
                  
                  <div className="flex gap-2">
                    <button 
                      onClick={handleSearch}
                      className="flex-1 bg-cyan-600 hover:bg-cyan-700 px-4 py-2 rounded-lg font-semibold text-sm flex items-center justify-center gap-2"
                    >
                      <Search className="w-4 h-4" />
                      Search
                    </button>
                    <button 
                      onClick={() => {
                        setSearchTerm('');
                        setActiveSearch('');
                        setLetterFilter('');
                        showNotification('Search cleared');
                      }}
                      className="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded-lg font-semibold text-sm"
                    >
                      Clear
                    </button>
                  </div>
                  
                  {activeSearch && (
                    <div className="text-xs text-gray-400 bg-gray-700/50 rounded px-3 py-2">
                      Searching for: <span className="text-cyan-400 font-semibold">"{activeSearch}"</span> • {sorted.length} found
                    </div>
                  )}
                  
                  <div className="pt-2 border-t border-gray-700">
                    <button 
                      onClick={() => setShowAdvancedSearch(true)}
                      className="w-full bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg font-semibold text-sm"
                    >
                      Advanced Filters
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<MovieLibrary />, document.getElementById('root'));
  </script>
</body>
</html>
